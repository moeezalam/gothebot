<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goethe Booking Bot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #11111b; color: #cdd6f4; min-height: 100vh;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0; border-bottom: 1px solid #313244; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
  }
  header h1 { font-size: 22px; display: flex; align-items: center; gap: 10px; }
  header h1 span { font-size: 14px; color: #585b70; font-weight: normal; }

  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
  }
  .badge-idle { background: #313244; color: #6c7086; }
  .badge-running { background: #1e3a2a; color: #a6e3a1; }
  .badge-stopping { background: #3a2e1e; color: #f9e2af; }
  .badge-disconnected { background: #3a1e2a; color: #f38ba8; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot-idle { background: #6c7086; }
  .dot-running { background: #a6e3a1; animation: pulse 1.5s infinite; }
  .dot-stopping { background: #f9e2af; animation: pulse 1s infinite; }
  .dot-disconnected { background: #f38ba8; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .backend-bar {
    display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .backend-bar input {
    flex: 1; min-width: 250px;
    background: #313244; border: 1px solid #45475a; border-radius: 6px;
    padding: 8px 12px; color: #cdd6f4; font-size: 13px;
  }
  .backend-bar input:focus { outline: none; border-color: #89b4fa; }

  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .col { flex: 1; min-width: 350px; }

  .card {
    background: #1e1e2e; border: 1px solid #313244; border-radius: 10px;
    padding: 16px; margin-bottom: 12px;
  }
  .card-title {
    font-size: 12px; font-weight: 600; text-transform: uppercase;
    color: #6c7086; letter-spacing: 0.5px; margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: center;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600;
    border: none; cursor: pointer; transition: all 0.15s;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-start { background: #40a02b; color: white; }
  .btn-start:hover:not(:disabled) { background: #4cb83a; }
  .btn-stop { background: #d20f39; color: white; }
  .btn-stop:hover:not(:disabled) { background: #e64553; }
  .btn-sm { font-size: 12px; padding: 6px 12px; }
  .btn-secondary { background: #45475a; color: #cdd6f4; }
  .btn-secondary:hover:not(:disabled) { background: #585b70; }
  .btn-outline {
    background: transparent; border: 1px solid #45475a; color: #cdd6f4;
  }
  .btn-outline:hover:not(:disabled) { border-color: #89b4fa; color: #89b4fa; }

  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 12px; }

  .config-actions { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
  .config-actions input[type="file"] { display: none; }

  .student-grid { display: grid; gap: 10px; }
  .student-card {
    background: #181825; border: 1px solid #313244; border-radius: 8px;
    padding: 14px; transition: border-color 0.3s;
  }
  .student-card.border-warning { border-color: #f9e2af; }
  .student-card.border-success { border-color: #a6e3a1; }
  .student-card.border-danger { border-color: #f38ba8; }
  .student-card.border-info { border-color: #89b4fa; }
  .student-card.border-secondary { border-color: #313244; }
  .student-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .student-meta { font-size: 12px; color: #6c7086; margin-bottom: 6px; }
  .student-status { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .text-warning { color: #f9e2af; }
  .text-success { color: #a6e3a1; }
  .text-danger { color: #f38ba8; }
  .text-info { color: #89b4fa; }
  .text-secondary { color: #6c7086; }

  .log-box {
    background: #0c0c16; border: 1px solid #313244; border-radius: 8px;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 12px; line-height: 1.6;
    height: 400px; overflow-y: auto; padding: 12px;
    white-space: pre-wrap; word-break: break-all;
  }
  .log-box::-webkit-scrollbar { width: 6px; }
  .log-box::-webkit-scrollbar-track { background: #11111b; }
  .log-box::-webkit-scrollbar-thumb { background: #45475a; border-radius: 3px; }
  .log-entry { padding: 1px 0; }
  .log-INFO { color: #cdd6f4; }
  .log-WARNING { color: #f9e2af; }
  .log-ERROR { color: #f38ba8; }
  .log-CRITICAL { color: #f38ba8; font-weight: bold; }
  .log-DEBUG { color: #585b70; }
  .log-heartbeat { color: #313244; font-size: 10px; }

  .summary-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .summary-table th { text-align: left; color: #6c7086; font-weight: 600; font-size: 11px; text-transform: uppercase; padding: 6px 8px; border-bottom: 1px solid #313244; }
  .summary-table td { padding: 6px 8px; border-bottom: 1px solid #252536; }

  .config-preview {
    background: #0c0c16; border: 1px solid #313244; border-radius: 6px;
    padding: 10px; font-family: monospace; font-size: 11px;
    max-height: 200px; overflow: auto; margin-top: 8px;
    white-space: pre; line-height: 1.5;
  }

  @media (max-width: 768px) {
    .row { flex-direction: column; }
    .col { min-width: 100%; }
    .controls { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🎓 Goethe Booking Bot <span>v1.0</span></h1>
    <div id="statusBadge" class="status-badge badge-disconnected">
      <span id="statusDot" class="dot dot-disconnected"></span>
      <span id="statusText">Disconnected</span>
    </div>
  </header>

  <!-- Backend URL -->
  <div class="backend-bar">
    <span style="font-size:13px;color:#6c7086;white-space:nowrap;">🔗 Backend URL:</span>
    <input type="text" id="backendUrl" placeholder="http://localhost:5000">
    <button class="btn btn-secondary btn-sm" onclick="connectBackend()">Connect</button>
    <span id="backendStatus" style="font-size:12px;color:#6c7086;"></span>
  </div>

  <!-- Config -->
  <div class="card">
    <div class="card-title">Configuration</div>
    <div class="config-actions">
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('csvFile').click()">📂 Upload config.csv</button>
      <input type="file" id="csvFile" accept=".csv" onchange="uploadConfig(event)">
      <button class="btn btn-secondary btn-sm" onclick="loadConfigFromBackend()">📥 Load from server</button>
      <button class="btn btn-outline btn-sm" onclick="toggleConfigPreview()">👁 Preview</button>
    </div>
    <div id="configInfo" style="font-size:12px;color:#6c7086;"></div>
    <div id="configPreview" class="config-preview" style="display:none;"></div>

    <div class="controls">
      <button id="btnStart" class="btn btn-start" onclick="startBot()">▶ Start Bot</button>
      <button id="btnStop" class="btn btn-stop" disabled onclick="stopBot()">■ Stop Bot</button>
      <label style="font-size:12px;color:#6c7086;display:flex;align-items:center;gap:4px;">
        <input type="checkbox" id="headlessMode" style="accent-color:#89b4fa;"> Headless
      </label>
    </div>
    <div style="margin-top:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <span style="font-size:12px;color:#6c7086;">📱 Telegram:</span>
      <input type="text" id="tgToken" placeholder="Bot Token" style="background:#313244;border:1px solid #45475a;border-radius:6px;padding:6px 10px;color:#cdd6f4;font-size:12px;width:180px;">
      <input type="text" id="tgChatId" placeholder="Chat ID" style="background:#313244;border:1px solid #45475a;border-radius:6px;padding:6px 10px;color:#cdd6f4;font-size:12px;width:180px;">
    </div>
  </div>

  <!-- Exam Schedule -->
  <div class="card" id="scheduleCard">
    <div class="card-title">
      <span>📅 Exam Schedule 2026</span>
      <button class="btn btn-secondary btn-sm" onclick="loadSchedule()">🔄 Refresh</button>
    </div>
    <div id="scheduleBody" style="font-size:12px;color:#6c7086;text-align:center;padding:10px;">Connect to backend to view schedule</div>
  </div>

  <div class="row">
    <div class="col">
      <div class="card">
        <div class="card-title">Students</div>
        <div id="studentGrid" class="student-grid">
          <div style="color:#6c7086;font-size:13px;text-align:center;padding:20px;">Connect to backend and load config</div>
        </div>
      </div>
      <div class="card" id="resultsCard" style="display:none;">
        <div class="card-title">Results</div>
        <table class="summary-table">
          <thead><tr><th>Student</th><th>Status</th><th>Reference</th></tr></thead>
          <tbody id="resultsBody"></tbody>
        </table>
      </div>
    </div>
    <div class="col">
      <div class="card">
        <div class="card-title">
          <span>Live Log</span>
          <button class="btn btn-secondary btn-sm" onclick="clearLog()">Clear</button>
        </div>
        <div id="logBox" class="log-box"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ──
let BASE = localStorage.getItem("backend_url") || "http://localhost:5000";
let running = false;
let evtSource = null;
let statusPollTimer = null;
let connected = false;

// ── Init ──
document.getElementById("backendUrl").value = BASE;
loadTelegramSettings();
connectBackend();

// ── Backend Connection ──
async function connectBackend() {
  BASE = document.getElementById("backendUrl").value.trim().replace(/\/+$/, "");
  localStorage.setItem("backend_url", BASE);
  document.getElementById("backendStatus").textContent = "Connecting...";
  try {
    const resp = await fetch(`${BASE}/api/status`, { signal: AbortSignal.timeout(5000) });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    connected = true;
    document.getElementById("backendStatus").textContent = "✅ Connected";
    updateBadge(false);
    await loadConfigFromBackend();
    await loadSchedule();
    startStatusPoll();
  } catch (e) {
    connected = false;
    document.getElementById("backendStatus").textContent = "❌ Cannot connect";
    document.getElementById("statusBadge").className = "status-badge badge-disconnected";
    document.getElementById("statusDot").className = "dot dot-disconnected";
    document.getElementById("statusText").textContent = "Disconnected";
  }
}

// ── Status Polling ──
function startStatusPoll() {
  if (statusPollTimer) clearInterval(statusPollTimer);
  statusPollTimer = setInterval(fetchStatus, 3000);
  fetchStatus();
}

async function fetchStatus() {
  if (!connected) return;
  try {
    const resp = await fetch(`${BASE}/api/status`, { signal: AbortSignal.timeout(4000) });
    const data = await resp.json();
    updateBadge(data.running);
    toggleButtons(data.running);
    if (data.students) updateStudentUI(data.students);
    if (!data.running && running) {
      running = false;
      closeSSE();
      setTimeout(loadResults, 1000);
    }
    running = data.running;
  } catch { /* ignore */ }
}

function updateStudentUI(students) {
  const grid = document.getElementById("studentGrid");
  grid.innerHTML = students.map(s => `
    <div class="student-card border-${s.color}" data-name="${escHtml(s.name)}">
      <div class="student-name">${escHtml(s.name)}</div>
      <div class="student-meta">${escHtml(s.level)} | ${escHtml(s.city)} | Booking: ${escHtml(s.booking_time)}</div>
      <div class="student-status text-${s.color}">
        <span class="status-dot" style="background:${getColor(s.color)};"></span>
        <span>${escHtml(s.status)}</span>
        ${s.details ? `<span style="font-size:11px;color:#6c7086;">— ${escHtml(s.details)}</span>` : ''}
      </div>
    </div>
  `).join("");
}

function updateBadge(isRunning) {
  const badge = document.getElementById("statusBadge");
  const dot = document.getElementById("statusDot");
  const text = document.getElementById("statusText");
  if (isRunning) {
    badge.className = "status-badge badge-running";
    dot.className = "dot dot-running";
    text.textContent = "Running";
  } else {
    badge.className = "status-badge badge-idle";
    dot.className = "dot dot-idle";
    text.textContent = "Idle";
  }
}

function toggleButtons(isRunning) {
  document.getElementById("btnStart").disabled = isRunning || !connected;
  document.getElementById("btnStop").disabled = !isRunning || !connected;
}

function getColor(c) {
  return {warning:"#f9e2af", success:"#a6e3a1", danger:"#f38ba8", info:"#89b4fa", secondary:"#6c7086"}[c] || "#6c7086";
}

// ── Config ──
async function loadConfigFromBackend() {
  if (!connected) return;
  try {
    const resp = await fetch(`${BASE}/api/config`, { signal: AbortSignal.timeout(5000) });
    const data = await resp.json();
    if (data.students && data.students.length > 0) {
      document.getElementById("configInfo").textContent = `✅ ${data.count} student(s) loaded`;
      updateStudentUI(data.students.map(s => ({
        name: s.name, level: s.level || s.exam_level, city: s.city,
        booking_time: s.booking_datetime, status: "Not started",
        color: "secondary", details: ""
      })));
      document.getElementById("configPreview").textContent =
        "name,email,password,level,city,booking_datetime,dob,place_of_birth,address,phone\n" +
        data.students.map(s => `${s.name},${s.email},${s.password},${s.level||s.exam_level||''},${s.city},${s.booking_datetime},${s.dob||''},${s.place_of_birth||''},${s.address||''},${s.phone||''}`).join("\n");
    } else {
      document.getElementById("configInfo").textContent = "⚠ No students on server. Upload a config.csv";
    }
  } catch (e) {
    document.getElementById("configInfo").textContent = "❌ Failed to load config";
  }
}

async function uploadConfig(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    const csvContent = e.target.result;
    try {
      const resp = await fetch(`${BASE}/api/config/upload`, {
        method: "POST",
        headers: {"Content-Type": "text/plain"},
        body: csvContent,
        signal: AbortSignal.timeout(10000),
      });
      const data = await resp.json();
      if (data.ok) {
        document.getElementById("configInfo").textContent = `✅ ${data.count} student(s) uploaded`;
        document.getElementById("configPreview").textContent = csvContent;
        await loadConfigFromBackend();
      } else {
        document.getElementById("configInfo").textContent = "❌ " + (data.error || "Upload failed");
      }
    } catch (err) {
      document.getElementById("configInfo").textContent = "❌ Upload error: " + err.message;
    }
  };
  reader.readAsText(file);
  event.target.value = "";
}

function toggleConfigPreview() {
  const el = document.getElementById("configPreview");
  el.style.display = el.style.display === "none" ? "" : "none";
}

// ── Start / Stop ──
async function startBot() {
  if (!connected) return alert("Connect to backend first");
  const body = {
    headless: document.getElementById("headlessMode").checked,
    telegram_token: document.getElementById("tgToken").value.trim(),
    telegram_chat_id: document.getElementById("tgChatId").value.trim(),
  };
  try {
    const resp = await fetch(`${BASE}/api/start`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(body),
      signal: AbortSignal.timeout(10000),
    });
    const data = await resp.json();
    if (!data.ok) return alert("Error: " + data.error);
    document.getElementById("logBox").innerHTML = "";
    document.getElementById("resultsCard").style.display = "none";
    startSSE();
  } catch (e) {
    alert("Failed to start: " + e.message);
  }
}

async function stopBot() {
  if (!connected) return;
  try {
    await fetch(`${BASE}/api/stop`, { method: "POST", signal: AbortSignal.timeout(5000) });
    document.getElementById("statusText").textContent = "Stopping...";
    closeSSE();
    setTimeout(loadResults, 2000);
  } catch (e) {
    alert("Failed to stop: " + e.message);
  }
}

// ── Schedule ──
async function loadSchedule() {
  if (!connected) return;
  try {
    const resp = await fetch(`${BASE}/api/schedule`, { signal: AbortSignal.timeout(5000) });
    const data = await resp.json();
    if (!data || data.length === 0) {
      document.getElementById("scheduleBody").innerHTML = '<span style="color:#6c7086;">No schedule data available</span>';
      return;
    }
    // Group by level
    const levels = ["A1","A2","B1"];
    let html = "";
    for (const lv of levels) {
      const items = data.filter(s => s.level === lv);
      if (items.length === 0) continue;
      html += `<div style="margin-bottom:10px;"><b style="color:#89b4fa;font-size:13px;">${lv}</b>`;
      html += `<table style="width:100%;border-collapse:collapse;font-size:11px;margin-top:4px;">`;
      html += `<tr style="color:#6c7086;font-size:10px;text-transform:uppercase;">
        <th style="text-align:left;padding:4px 6px;border-bottom:1px solid #313244;">City</th>
        <th style="text-align:left;padding:4px 6px;border-bottom:1px solid #313244;">Exam Date</th>
        <th style="text-align:left;padding:4px 6px;border-bottom:1px solid #313244;">Registration</th>
        <th style="text-align:left;padding:4px 6px;border-bottom:1px solid #313244;">Bookable</th>
        <th style="text-align:left;padding:4px 6px;border-bottom:1px solid #313244;">Price</th>
        <th style="text-align:left;padding:4px 6px;border-bottom:1px solid #313244;">Status</th>
      </tr>`;
      for (const s of items) {
        const statColor = s.status === "fully_booked" ? "#f38ba8" : s.status === "upcoming" ? "#a6e3a1" : "#6c7086";
        const statLabel = s.status === "fully_booked" ? "❌ Fully booked" : "✅ Open";
        html += `<tr>
          <td style="padding:4px 6px;border-bottom:1px solid #252536;">${escHtml(s.city)}</td>
          <td style="padding:4px 6px;border-bottom:1px solid #252536;">${escHtml(s.exam_date)}</td>
          <td style="padding:4px 6px;border-bottom:1px solid #252536;">${escHtml(s.registration_period)}</td>
          <td style="padding:4px 6px;border-bottom:1px solid #252536;">${escHtml(s.bookable_from)}</td>
          <td style="padding:4px 6px;border-bottom:1px solid #252536;">${escHtml(s.price_full)}</td>
          <td style="padding:4px 6px;border-bottom:1px solid #252536;color:${statColor};">${statLabel}</td>
        </tr>`;
      }
      html += `</table></div>`;
    }
    document.getElementById("scheduleBody").innerHTML = html;
  } catch (e) {
    document.getElementById("scheduleBody").innerHTML = '<span style="color:#f38ba8;">Failed to load schedule</span>';
  }
}

async function loadResults() {
  try {
    const resp = await fetch(`${BASE}/api/results`, { signal: AbortSignal.timeout(5000) });
    const results = await resp.json();
    if (results.length === 0) return;
    document.getElementById("resultsCard").style.display = "";
    document.getElementById("resultsBody").innerHTML = results.map(r => {
      const ref = r.reference || "";
      const emoji = r.status === "confirmed" ? "✅" : r.status === "submitted" ? "✅" : r.status === "stopped" ? "⛔" : "❌";
      return `<tr><td>${escHtml(r.name)}</td><td>${emoji} ${r.status}</td><td>${escHtml(ref)}</td></tr>`;
    }).join("");
  } catch { /* ignore */ }
}

// ── SSE Logs ──
function startSSE() {
  closeSSE();
  evtSource = new EventSource(`${BASE}/api/logs`);
  evtSource.onmessage = function(e) {
    try {
      const data = JSON.parse(e.data);
      if (data.type === "heartbeat") return;
      appendLog(data);
    } catch { /* ignore */ }
  };
  evtSource.onerror = function() { /* auto-reconnect */ };
}

function closeSSE() {
  if (evtSource) { evtSource.close(); evtSource = null; }
}

function appendLog(data) {
  const box = document.getElementById("logBox");
  const div = document.createElement("div");
  div.className = `log-entry log-${data.level || "INFO"}`;
  div.textContent = data.message || "";
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  while (box.children.length > 500) box.removeChild(box.firstChild);
}

function clearLog() { document.getElementById("logBox").innerHTML = ""; }

// ── Telegram persistence ──
function loadTelegramSettings() {
  const t = localStorage.getItem("tg_token");
  if (t) document.getElementById("tgToken").value = t;
  const c = localStorage.getItem("tg_chat_id");
  if (c) document.getElementById("tgChatId").value = c;
}
document.getElementById("tgToken").onchange = () => localStorage.setItem("tg_token", document.getElementById("tgToken").value);
document.getElementById("tgChatId").onchange = () => localStorage.setItem("tg_chat_id", document.getElementById("tgChatId").value);

// ── Helpers ──
function escHtml(s) {
  if (!s) return "";
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
