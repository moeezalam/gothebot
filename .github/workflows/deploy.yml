name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Runs on BOTH push and PR so it can gate the deploy jobs below.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Import/compile smoke (catches syntax + import-time errors)
        # pytest alone never imports webapp/websocket_handler, so a syntax error
        # there (see the Part-5 IndentationError) could reach prod. Guard it.
        run: |
          python -m py_compile $(git ls-files '*.py')
          python -c "import webapp; print('webapp imports OK')"
      - name: Unit tests
        # Exclude tests that need a live server (test_e2e) or hit the real
        # goethe.de portal (test_live_integration runs in live-integration.yml).
        run: python -m pytest tests/ -q --ignore=tests/test_e2e.py --ignore=tests/test_live_integration.py
      - name: Security audit
        run: pip install pip-audit && pip-audit --desc on 2>&1 || true

  deploy-vercel:
    needs: [test]                       # gate: never deploy on failing tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Deploy frontend to Vercel
        run: vercel deploy --prod --cwd frontend --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-railway:
    needs: [test]                       # gate: never deploy on failing tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Link Railway project
        run: railway link --project 520adb72-b1f4-4021-8c4b-21ca81f8a901
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      - name: Deploy to Railway
        run: railway up --detach --service f568e242-4d2a-4b44-8205-07899abfbd26
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      - name: Health check gate (zero-downtime verification)
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf https://goethe-booking-bot-production-21af.up.railway.app/api/health 2>/dev/null | python -c "import sys,json; print(json.load(sys.stdin).get('status','down'))" 2>/dev/null || echo "down")
            if [ "$STATUS" = "ok" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Waiting... (attempt $i/30)"
            sleep 5
          done
          echo "Health check failed after 30 attempts"
          exit 1
      - name: Notify deploy success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=✅ Deploy successful: booking-bot%0ACommit: ${{ github.sha }}%0ARailway: https://goethe-booking-bot-production-21af.up.railway.app%0AFrontend: https://goethe-frontend-v3.vercel.app" > /dev/null 2>&1 || true
      - name: Notify deploy failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=❌ Deploy FAILED: goethe-booking-bot%0ACommit: ${{ github.sha }}%0ACheck: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" > /dev/null 2>&1 || true
