name: Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      AUTH_EMAIL: ${{ secrets.AUTH_EMAIL }}
      AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Start server
        run: |
          python webapp.py &
          sleep 5
          echo "Server started"
      - name: Health check
        run: curl -sf http://127.0.0.1:5000/api/health | python -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok'; print('Health OK')"
      - name: Login endpoint
        run: |
          curl -sf -X POST http://127.0.0.1:5000/api/login \
            -H "Content-Type: application/json" \
            -d '{"email":"${{ secrets.AUTH_EMAIL }}","password":"${{ secrets.AUTH_PASSWORD }}"}' | \
            python -c "import sys,json; d=json.load(sys.stdin); assert d['ok']; print('Login OK')"
